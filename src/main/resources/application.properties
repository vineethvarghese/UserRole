# ============================================================
# Spring Application
# ============================================================
spring.application.name=userrole

# ============================================================
# H2 Database (in-memory, PostgreSQL compatibility mode)
# ============================================================
spring.datasource.url=jdbc:h2:mem:userroledb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 Console (development only)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ============================================================
# JPA / Hibernate
# ============================================================
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# ============================================================
# Flyway
# ============================================================
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=false

# ============================================================
# JWT Configuration
# ============================================================
# Secret key (Base64-encoded 256-bit key — replace in production)
jwt.secret=dGhpcyBpcyBhIHNlY3JldCBrZXkgZm9yIHVzZXJyb2xlIHNlcnZpY2UgdjE=
jwt.access-token-expiry-seconds=900
jwt.refresh-token-expiry-seconds=604800

# ============================================================
# Rate Limiting
# ============================================================
ratelimit.anonymous.requests-per-minute=30
ratelimit.authenticated.requests-per-minute=120

# ============================================================
# Server
# ============================================================
server.port=8080
