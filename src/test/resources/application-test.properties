# ============================================================
# Test profile — overrides production application.properties
# ============================================================
spring.datasource.url=jdbc:h2:mem:testdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# Disable H2 console in tests
spring.h2.console.enabled=false

# JWT — same secret as production so JwtTestHelper can build tokens the app trusts
jwt.secret=dGhpcyBpcyBhIHNlY3JldCBrZXkgZm9yIHVzZXJyb2xlIHNlcnZpY2UgdjE=
jwt.access-token-expiry-seconds=900
jwt.refresh-token-expiry-seconds=604800

# Rate limits — set very high for the shared test context so bucket exhaustion does not
# contaminate unrelated tests. RateLimitApiTest overrides these via @TestPropertySource
# to the low values (3/5) it actually needs to test rate-limiting behaviour.
ratelimit.anonymous.requests-per-minute=10000
ratelimit.authenticated.requests-per-minute=10000
